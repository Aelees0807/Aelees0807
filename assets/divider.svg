<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 20" width="960" height="20">
 <defs>
  <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0"/>
    <stop offset="50%" stop-color="#5EEAD4" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#FF8A5B" stop-opacity="0"/>
  </linearGradient>
  <style type="text/css"><![CDATA[
    .scanner { animation: scan 5s linear infinite; }
    @keyframes scan {
      0%   { transform: translateX(-260px); }
      100% { transform: translateX(960px); }
    }
  ]]></style>
 </defs>
 <line x1="0" y1="10.0" x2="960" y2="10.0" stroke="#232A38" stroke-width="1"/>
 <rect class="scanner" x="0" y="9.0" width="260" height="2" fill="url(#scanGrad)"/>
</svg>
