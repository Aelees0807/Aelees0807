<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 246" width="960" height="246">
 <defs>
  <style type="text/css"><![CDATA[
    .status-dot { animation: blink 2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
    .fade-in { animation: fadein 1s ease-out both; }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  ]]></style>
  <pattern id="dotgrid" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1.2" cy="1.2" r="1.2" fill="#232A38" opacity="0.55"/>
  </pattern>
 </defs>

 <rect x="1" y="1" width="958" height="244" rx="3" fill="#10141C" stroke="#232A38" stroke-width="1.2"/>
 <rect x="1" y="1" width="958" height="244" rx="3" fill="url(#dotgrid)"/>

 <!-- left accent rule -->
 <line x1="48" y1="46" x2="48" y2="222" stroke="#FF8A5B" stroke-width="2"/>

 <g class="fade-in">
   <text x="70" y="66" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11.5" letter-spacing="2.5" fill="#7C8496">MODEL CARD  //  REV. 3.6-CHARUSAT</text>

   <text x="68" y="120" font-family="Georgia, 'Times New Roman', Times, serif" font-size="52" fill="#E8E6DF">Aelees Bhuva</text>

   <text x="70" y="148" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="14" fill="#FF8A5B">ml enthusiast &#183; data scientist &#183; full-stack builder</text>
   <text x="70" y="170" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="14" fill="#7C8496">— currently in training</text>
 </g>

 <!-- status pill -->
 <rect x="68" y="196" width="150" height="26" rx="13" fill="#0B0E14" stroke="#232A38" stroke-width="1"/>
 <circle class="status-dot" cx="86" cy="209" r="4" fill="#5EEAD4"/>
 <text x="98" y="213" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" fill="#E8E6DF">status: training</text>

 <!-- right meta block -->
 <text x="920" y="70" text-anchor="end" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" fill="#7C8496">B.TECH · COMPUTER ENGINEERING</text>
 <text x="920" y="92" text-anchor="end" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" fill="#7C8496">DEPSTAR · CHARUSAT UNIVERSITY</text>

 <text x="920" y="140" text-anchor="end" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="11" fill="#7C8496">epoch</text>
 <text x="920" y="162" text-anchor="end" font-family="Georgia, 'Times New Roman', Times, serif" font-size="26" fill="#5EEAD4">07</text>
</svg>
